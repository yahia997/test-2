name: Evaluate Student Submission

on:
  repository_dispatch:
    types: [remotes]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Clone student's repository
      # ------------------------------------------------------------
      - name: Checkout student repository
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.event.client_payload.student_repo_link }}
          path: student-code
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2. Evaluate submission
      #
      # Replace this step with your own testing logic.
      # This step MUST generate reports/<submission_id>.json
      # ------------------------------------------------------------
      - name: Run evaluation
        if: steps.checkout.outcome == 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cd student-code

          # Fetch all branches from the student's own repo, since checkout
          # only brings the default branch by default
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' > /dev/null 2>&1

          PASSED=0
          TOTAL=5
          declare -A CHECKS

          # 1. remotes_report.txt exists, is tracked, and mentions "upstream"
          if git ls-files --error-unmatch remotes_report.txt > /dev/null 2>&1 \
             && grep -q "upstream" remotes_report.txt; then
            CHECKS[remotes_report_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[remotes_report_correct]="fail"
          fi

          # 2. remotes_report.txt actually references the correct upstream URL
          if grep -q "yahia997/public" remotes_report.txt 2>/dev/null; then
            CHECKS[upstream_url_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[upstream_url_correct]="fail"
          fi

          # 3. A merge commit from upstream/main exists on main (2+ parents)
          MERGE_FOUND="fail"
          for sha in $(git log main --merges --pretty=format:"%H"); do
            PARENTS=$(git rev-list --parents -n 1 "$sha" | wc -w)
            if [ "$PARENTS" -ge 3 ]; then
              MERGE_FOUND="pass"
              break
            fi
          done
          if [ "$MERGE_FOUND" = "pass" ]; then
            CHECKS[merge_commit_exists]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[merge_commit_exists]="fail"
          fi

          # 4. remote-practice branch exists on their own origin (pushed, not just local)
          if git show-ref --verify --quiet refs/remotes/origin/remote-practice; then
            CHECKS[branch_pushed]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[branch_pushed]="fail"
          fi

          # 5. The commit made on remote-practice actually exists on that branch
          if git log origin/remote-practice --oneline --grep="Add remote practice notes" 2>/dev/null | grep -q .; then
            CHECKS[branch_commit_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[branch_commit_correct]="fail"
          fi

          cd ..

          RESULTS_JSON="{"
          FIRST=1
          for key in "${!CHECKS[@]}"; do
            if [ $FIRST -eq 0 ]; then RESULTS_JSON+=","; fi
            RESULTS_JSON+="\"$key\": \"${CHECKS[$key]}\""
            FIRST=0
          done
          RESULTS_JSON+="}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": $PASSED,
            "total": $TOTAL,
            "results": $RESULTS_JSON
          }
          EOF

      # ------------------------------------------------------------
      # 3. Repository couldn't be cloned
      # ------------------------------------------------------------
      - name: Generate checkout error report
        if: steps.checkout.outcome != 'success'
        run: |
          mkdir -p reports

          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": 0,
            "total": 0,
            "error": "Repository could not be cloned."
          }
          EOF

      # ------------------------------------------------------------
      # 4. Upload report
      # ------------------------------------------------------------
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.client_payload.submission_id }}
          path: reports/${{ github.event.client_payload.submission_id }}.json

      # ------------------------------------------------------------
      # 5. Notify backend
      # ------------------------------------------------------------
      - name: Send result to backend
        if: always()
        run: |
          curl --fail -X POST "${{ secrets.BACKEND_URL }}/api/submissions/callback" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d @reports/${{ github.event.client_payload.submission_id }}.json