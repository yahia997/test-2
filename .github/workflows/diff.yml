name: Evaluate Student Submission

on:
  repository_dispatch:
    types: [diff]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Clone student's repository
      # ------------------------------------------------------------
      - name: Checkout student repository
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.event.client_payload.student_repo_link }}
          path: student-code
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2. Evaluate submission
      #
      # Replace this step with your own testing logic.
      # This step MUST generate reports/<submission_id>.json
      # ------------------------------------------------------------
      - name: Run evaluation
        if: steps.checkout.outcome == 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cd student-code

          PASSED=0
          TOTAL=5
          declare -A CHECKS

          # 1. Both diff report files exist and are tracked
          if git ls-files --error-unmatch diff_reports/unstaged.diff > /dev/null 2>&1 \
             && git ls-files --error-unmatch diff_reports/staged.diff > /dev/null 2>&1; then
            CHECKS[diff_files_tracked]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[diff_files_tracked]="fail"
          fi

          # 2. unstaged.diff actually looks like a real git diff (has diff headers)
          if [ -f "diff_reports/unstaged.diff" ] && grep -q "^diff --git" diff_reports/unstaged.diff; then
            CHECKS[unstaged_diff_valid]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[unstaged_diff_valid]="fail"
          fi

          # 3. staged.diff actually looks like a real git diff too
          if [ -f "diff_reports/staged.diff" ] && grep -q "^diff --git" diff_reports/staged.diff; then
            CHECKS[staged_diff_valid]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[staged_diff_valid]="fail"
          fi

          # 4. Both diffs reference hello.txt and the actual added line
          if grep -q "hello.txt" diff_reports/unstaged.diff 2>/dev/null \
             && grep -q "a brand new unstaged line" diff_reports/unstaged.diff 2>/dev/null \
             && grep -q "hello.txt" diff_reports/staged.diff 2>/dev/null \
             && grep -q "a brand new unstaged line" diff_reports/staged.diff 2>/dev/null; then
            CHECKS[diff_content_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[diff_content_correct]="fail"
          fi

          # 5. The final commit actually contains the real change to hello.txt
          #    (proves they didn't just fake the diff files without making the real edit)
          if git log -p -1 --pretty=format: -- git_github/hello.txt | grep -q "a brand new unstaged line"; then
            CHECKS[real_change_committed]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[real_change_committed]="fail"
          fi

          cd ..

          RESULTS_JSON="{"
          FIRST=1
          for key in "${!CHECKS[@]}"; do
            if [ $FIRST -eq 0 ]; then RESULTS_JSON+=","; fi
            RESULTS_JSON+="\"$key\": \"${CHECKS[$key]}\""
            FIRST=0
          done
          RESULTS_JSON+="}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": $PASSED,
            "total": $TOTAL,
            "results": $RESULTS_JSON
          }
          EOF

      # ------------------------------------------------------------
      # 3. Repository couldn't be cloned
      # ------------------------------------------------------------
      - name: Generate checkout error report
        if: steps.checkout.outcome != 'success'
        run: |
          mkdir -p reports

          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": 0,
            "total": 0,
            "error": "Repository could not be cloned."
          }
          EOF

      # ------------------------------------------------------------
      # 4. Upload report
      # ------------------------------------------------------------
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.client_payload.submission_id }}
          path: reports/${{ github.event.client_payload.submission_id }}.json

      # ------------------------------------------------------------
      # 5. Notify backend
      # ------------------------------------------------------------
      - name: Send result to backend
        if: always()
        run: |
          curl --fail -X POST "${{ secrets.BACKEND_URL }}/api/submissions/callback" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d @reports/${{ github.event.client_payload.submission_id }}.json