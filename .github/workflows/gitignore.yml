name: Evaluate Student Submission

on:
  repository_dispatch:
    types: [gitignore]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Clone student's repository
      # ------------------------------------------------------------
      - name: Checkout student repository
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.event.client_payload.student_repo_link }}
          path: student-code
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2. Clone reference libgit2 repo for comparison
      # ------------------------------------------------------------
      - name: Clone reference repository
        id: reference
        if: steps.checkout.outcome == 'success'
        continue-on-error: true
        run: git clone --depth 1 https://github.com/libgit2/libgit2.git reference-code

      # ------------------------------------------------------------
      # 3. Evaluate submission
      # ------------------------------------------------------------
      - name: Run evaluation
        if: steps.checkout.outcome == 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cd student-code

          PASSED=0
          TOTAL=7
          declare -A CHECKS

          # --- Rule presence checks (is .gitignore even written correctly?) ---

          # 1. build/ directory rule
          if grep -qE '(^|/)build/?$' .gitignore 2>/dev/null; then
            CHECKS[build_rule]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[build_rule]="fail"
          fi

          # 2. *.log with !lib.log negation
          if grep -qE '^\*\.log$' .gitignore 2>/dev/null && grep -qE '^!lib\.log$' .gitignore 2>/dev/null; then
            CHECKS[log_negation_rule]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[log_negation_rule]="fail"
          fi

          # 3. anchored /TODO rule
          if grep -qE '^/TODO$' .gitignore 2>/dev/null; then
            CHECKS[anchored_todo_rule]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[anchored_todo_rule]="fail"
          fi

          # 4. docs/**/z nested rule (accepts assets/a/**/z or similar double-star pattern)
          if grep -qE 'assets/a/\*\*/z' .gitignore 2>/dev/null; then
            CHECKS[nested_doublestar_rule]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[nested_doublestar_rule]="fail"
          fi

          # --- Behavioral checks (did it actually work, not just written on paper?) ---

          UNTRACKED_OK="pass"
          for f in build/output.o debug.log git_github/debug.log TODO docs/notes.txt assets/a/z assets/a/b/z assets/a/b/c/z; do
            if git ls-files --error-unmatch "$f" > /dev/null 2>&1; then
              UNTRACKED_OK="fail"
            fi
          done
          CHECKS[unwanted_files_not_tracked]="$UNTRACKED_OK"
          [ "$UNTRACKED_OK" = "pass" ] && PASSED=$((PASSED+1))

          TRACKED_OK="pass"
          for f in lib.log git_github/TODO docs/server/arch.txt; do
            if ! git ls-files --error-unmatch "$f" > /dev/null 2>&1; then
              TRACKED_OK="fail"
            fi
          done
          CHECKS[wanted_files_tracked]="$TRACKED_OK"
          [ "$TRACKED_OK" = "pass" ] && PASSED=$((PASSED+1))

          if git ls-files --error-unmatch .gitignore > /dev/null 2>&1; then
            CHECKS[gitignore_tracked]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[gitignore_tracked]="fail"
          fi

          cd ..

          # Build JSON results object from associative array
          RESULTS_JSON="{"
          FIRST=1
          for key in "${!CHECKS[@]}"; do
            if [ $FIRST -eq 0 ]; then RESULTS_JSON+=","; fi
            RESULTS_JSON+="\"$key\": \"${CHECKS[$key]}\""
            FIRST=0
          done
          RESULTS_JSON+="}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": $PASSED,
            "total": $TOTAL,
            "results": $RESULTS_JSON
          }
          EOF

      # ------------------------------------------------------------
      # 4. Repository couldn't be cloned (student or reference)
      # ------------------------------------------------------------
      - name: Generate checkout error report
        if: steps.checkout.outcome != 'success' || steps.reference.outcome != 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": 0,
            "total": 0,
            "error": "Repository could not be cloned or reference repo unavailable."
          }
          EOF

      # ------------------------------------------------------------
      # 5. Upload report
      # ------------------------------------------------------------
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.client_payload.submission_id }}
          path: reports/${{ github.event.client_payload.submission_id }}.json

      # ------------------------------------------------------------
      # 6. Notify backend
      # ------------------------------------------------------------
      - name: Send result to backend
        if: always()
        run: |
          curl --fail -X POST "${{ secrets.BACKEND_URL }}/api/submissions/callback" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d @reports/${{ github.event.client_payload.submission_id }}.json