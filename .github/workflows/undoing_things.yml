name: Evaluate Student Submission

on:
  repository_dispatch:
    types: [undo]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Clone student's repository
      # ------------------------------------------------------------
      - name: Checkout student repository
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.event.client_payload.student_repo_link }}
          path: student-code
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2. Evaluate submission
      #
      # Replace this step with your own testing logic.
      # This step MUST generate reports/<submission_id>.json
      # ------------------------------------------------------------
      - name: Run evaluation
        if: steps.checkout.outcome == 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cd student-code

          PASSED=0
          TOTAL=5
          declare -A CHECKS

          # 1. Amend worked: only ONE commit exists with "amend" in it (not two),
          #    the message was corrected, and both files ended up in that same commit
          AMEND_COMMITS=$(git log --oneline --grep="amend target" -i | wc -l)
          AMEND_MSG_OK=$(git log --oneline --grep="Add amend target file" | grep -qv "fiel" && echo pass || echo fail)
          AMEND_SHA=$(git log --oneline --grep="Add amend target file" | head -n1 | cut -d' ' -f1)
          AMEND_FILES_TOGETHER="fail"
          if [ -n "$AMEND_SHA" ]; then
            FILES_IN_COMMIT=$(git show --name-only --pretty=format: "$AMEND_SHA" | grep -c -E 'amend_target.txt|amend_notes.txt')
            [ "$FILES_IN_COMMIT" -eq 2 ] && AMEND_FILES_TOGETHER="pass"
          fi
          if [ "$AMEND_COMMITS" -eq 1 ] && [ "$AMEND_FILES_TOGETHER" = "pass" ]; then
            CHECKS[amend_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[amend_correct]="fail"
          fi

          # 2. No stray "fiel" typo commit survived in history
          if ! git log --oneline --grep="fiel" | grep -q .; then
            CHECKS[typo_commit_gone]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[typo_commit_gone]="fail"
          fi

          # 3. hello.txt and scratch.txt were committed SEPARATELY (proves unstage worked,
          #    rather than committing both together)
          HELLO_COMMIT=$(git log --oneline --grep="Another update to hello" | wc -l)
          SCRATCH_COMMIT=$(git log --oneline --grep="Add scratch notes" | wc -l)
          if [ "$HELLO_COMMIT" -ge 1 ] && [ "$SCRATCH_COMMIT" -ge 1 ]; then
            HELLO_SHA=$(git log --oneline --grep="Another update to hello" | head -n1 | cut -d' ' -f1)
            SCRATCH_IN_HELLO_COMMIT=$(git show --name-only --pretty=format: "$HELLO_SHA" | grep -c "scratch.txt")
            if [ "$SCRATCH_IN_HELLO_COMMIT" -eq 0 ]; then
              CHECKS[unstage_correct]="pass"; PASSED=$((PASSED+1))
            else
              CHECKS[unstage_correct]="fail"
            fi
          else
            CHECKS[unstage_correct]="fail"
          fi

          # 4. scratch.txt eventually got tracked (proves edits weren't lost, just delayed)
          if git ls-files --error-unmatch scratch.txt > /dev/null 2>&1; then
            CHECKS[scratch_eventually_tracked]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[scratch_eventually_tracked]="fail"
          fi

          # 5. Discarded content never made it into any commit
          if ! git log -p --all -- git_github/hello.txt | grep -q "THIS IS A MISTAKE"; then
            CHECKS[discard_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[discard_correct]="fail"
          fi

          cd ..

          RESULTS_JSON="{"
          FIRST=1
          for key in "${!CHECKS[@]}"; do
            if [ $FIRST -eq 0 ]; then RESULTS_JSON+=","; fi
            RESULTS_JSON+="\"$key\": \"${CHECKS[$key]}\""
            FIRST=0
          done
          RESULTS_JSON+="}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": $PASSED,
            "total": $TOTAL,
            "results": $RESULTS_JSON
          }
          EOF

      # ------------------------------------------------------------
      # 3. Repository couldn't be cloned
      # ------------------------------------------------------------
      - name: Generate checkout error report
        if: steps.checkout.outcome != 'success'
        run: |
          mkdir -p reports

          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": 0,
            "total": 0,
            "error": "Repository could not be cloned."
          }
          EOF

      # ------------------------------------------------------------
      # 4. Upload report
      # ------------------------------------------------------------
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.client_payload.submission_id }}
          path: reports/${{ github.event.client_payload.submission_id }}.json

      # ------------------------------------------------------------
      # 5. Notify backend
      # ------------------------------------------------------------
      - name: Send result to backend
        if: always()
        run: |
          curl --fail -X POST "${{ secrets.BACKEND_URL }}/api/submissions/callback" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d @reports/${{ github.event.client_payload.submission_id }}.json