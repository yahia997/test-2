name: Evaluate Student Submission

on:
  repository_dispatch:
    types: [remove-rename]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Clone student's repository
      # ------------------------------------------------------------
      - name: Checkout student repository
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.event.client_payload.student_repo_link }}
          path: student-code
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2. Clone reference libgit2 repo for comparison
      # ------------------------------------------------------------
      - name: Clone reference repository
        id: reference
        if: steps.checkout.outcome == 'success'
        continue-on-error: true
        run: git clone --depth 1 https://github.com/libgit2/libgit2.git reference-code

      # ------------------------------------------------------------
      # 3. Evaluate submission
      # ------------------------------------------------------------
      - name: Run evaluation
        if: steps.checkout.outcome == 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cd student-code

          PASSED=0
          TOTAL=5
          declare -A CHECKS

          # 1. git_github/TODO fully removed (not tracked anymore)
          if ! git ls-files --error-unmatch git_github/TODO > /dev/null 2>&1; then
            CHECKS[todo_removed]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[todo_removed]="fail"
          fi

          # 2. lib.log untracked (removed from Git, not necessarily from disk)
          if ! git ls-files --error-unmatch lib.log > /dev/null 2>&1; then
            CHECKS[liblog_untracked]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[liblog_untracked]="fail"
          fi

          # 3. lib.log added to .gitignore, to prevent re-tracking
          if [ -f ".gitignore" ] && grep -qE '(^|/)lib\.log$' .gitignore; then
            CHECKS[liblog_ignored]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[liblog_ignored]="fail"
          fi

          # 4. old a.txt is gone, new hello.txt is tracked
          if ! git ls-files --error-unmatch git_github/a.txt > /dev/null 2>&1 \
             && git ls-files --error-unmatch git_github/hello.txt > /dev/null 2>&1; then
            CHECKS[file_renamed]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[file_renamed]="fail"
          fi

          # 5. Git recognizes this as a rename (content-similarity based),
          #    verified by checking history carries over via --follow
          RENAME_LOG=$(git log --follow --oneline -- git_github/hello.txt 2>/dev/null | wc -l)
          if [ "$RENAME_LOG" -ge 2 ]; then
            CHECKS[rename_history_preserved]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[rename_history_preserved]="fail"
          fi

          cd ..

          RESULTS_JSON="{"
          FIRST=1
          for key in "${!CHECKS[@]}"; do
            if [ $FIRST -eq 0 ]; then RESULTS_JSON+=","; fi
            RESULTS_JSON+="\"$key\": \"${CHECKS[$key]}\""
            FIRST=0
          done
          RESULTS_JSON+="}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": $PASSED,
            "total": $TOTAL,
            "results": $RESULTS_JSON
          }
          EOF

      # ------------------------------------------------------------
      # 4. Repository couldn't be cloned (student or reference)
      # ------------------------------------------------------------
      - name: Generate checkout error report
        if: steps.checkout.outcome != 'success' || steps.reference.outcome != 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": 0,
            "total": 0,
            "error": "Repository could not be cloned or reference repo unavailable."
          }
          EOF

      # ------------------------------------------------------------
      # 5. Upload report
      # ------------------------------------------------------------
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.client_payload.submission_id }}
          path: reports/${{ github.event.client_payload.submission_id }}.json

      # ------------------------------------------------------------
      # 6. Notify backend
      # ------------------------------------------------------------
      - name: Send result to backend
        if: always()
        run: |
          curl --fail -X POST "${{ secrets.BACKEND_URL }}/api/submissions/callback" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d @reports/${{ github.event.client_payload.submission_id }}.json