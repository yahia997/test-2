name: Evaluate Student Submission

on:
  repository_dispatch:
    types: [git_history]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Clone student's repository
      # ------------------------------------------------------------
      - name: Checkout student repository
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.event.client_payload.student_repo_link }}
          path: student-code
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2. Clone reference libgit2 repo for comparison
      # ------------------------------------------------------------
      - name: Clone reference repository
        id: reference
        if: steps.checkout.outcome == 'success'
        continue-on-error: true
        run: git clone --depth 1 https://github.com/libgit2/libgit2.git reference-code

      # ------------------------------------------------------------
      # 3. Evaluate submission
      # ------------------------------------------------------------
      - name: Run evaluation
        if: steps.checkout.outcome == 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cd student-code

          PASSED=0
          TOTAL=5
          declare -A CHECKS

          # 1. The three new commits actually exist with correct messages
          if git log --oneline --grep="Update hello with step one" | grep -q . \
             && git log --oneline --grep="Update hello with step two" | grep -q . \
             && git log --oneline --grep="Fix typo in hello.txt" | grep -q .; then
            CHECKS[commits_created]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[commits_created]="fail"
          fi

          # 2. log_reports/last_three.txt exists and has exactly 3 lines
          if [ -f "log_reports/last_three.txt" ] && [ "$(wc -l < log_reports/last_three.txt)" -eq 3 ]; then
            CHECKS[last_three_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[last_three_correct]="fail"
          fi

          # 3. log_reports/fix_commits.txt exists and actually contains the "fix" commit
          if [ -f "log_reports/fix_commits.txt" ] && grep -qi "fix typo in hello" log_reports/fix_commits.txt; then
            CHECKS[fix_commits_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[fix_commits_correct]="fail"
          fi

          # 4. log_reports/hello_history.txt exists and its line count matches
          #    the real number of commits that touched git_github/hello.txt
          EXPECTED_COUNT=$(git log --oneline -- git_github/hello.txt | wc -l)
          if [ -f "log_reports/hello_history.txt" ] && [ "$(wc -l < log_reports/hello_history.txt)" -eq "$EXPECTED_COUNT" ]; then
            CHECKS[hello_history_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[hello_history_correct]="fail"
          fi

          # 5. log_reports itself was committed (not just left as untracked local files)
          if git ls-files --error-unmatch log_reports/last_three.txt > /dev/null 2>&1 \
             && git ls-files --error-unmatch log_reports/fix_commits.txt > /dev/null 2>&1 \
             && git ls-files --error-unmatch log_reports/hello_history.txt > /dev/null 2>&1; then
            CHECKS[log_reports_tracked]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[log_reports_tracked]="fail"
          fi

          cd ..

          RESULTS_JSON="{"
          FIRST=1
          for key in "${!CHECKS[@]}"; do
            if [ $FIRST -eq 0 ]; then RESULTS_JSON+=","; fi
            RESULTS_JSON+="\"$key\": \"${CHECKS[$key]}\""
            FIRST=0
          done
          RESULTS_JSON+="}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": $PASSED,
            "total": $TOTAL,
            "results": $RESULTS_JSON
          }
          EOF

      # ------------------------------------------------------------
      # 4. Repository couldn't be cloned (student or reference)
      # ------------------------------------------------------------
      - name: Generate checkout error report
        if: steps.checkout.outcome != 'success' || steps.reference.outcome != 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": 0,
            "total": 0,
            "error": "Repository could not be cloned or reference repo unavailable."
          }
          EOF

      # ------------------------------------------------------------
      # 5. Upload report
      # ------------------------------------------------------------
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.client_payload.submission_id }}
          path: reports/${{ github.event.client_payload.submission_id }}.json

      # ------------------------------------------------------------
      # 6. Notify backend
      # ------------------------------------------------------------
      - name: Send result to backend
        if: always()
        run: |
          curl --fail -X POST "${{ secrets.BACKEND_URL }}/api/submissions/callback" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d @reports/${{ github.event.client_payload.submission_id }}.json