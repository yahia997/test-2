name: Evaluate Student Submission

on:
  repository_dispatch:
    types: [tags]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. Clone student's repository
      # ------------------------------------------------------------
      - name: Checkout student repository
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.event.client_payload.student_repo_link }}
          path: student-code
          fetch-depth: 0

      # ------------------------------------------------------------
      # 2. Evaluate submission
      #
      # Replace this step with your own testing logic.
      # This step MUST generate reports/<submission_id>.json
      # ------------------------------------------------------------
      - name: Run evaluation
        if: steps.checkout.outcome == 'success'
        run: |
          mkdir -p reports
          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cd student-code

          # Fetch tags and all branches explicitly, since checkout doesn't
          # guarantee either by default
          git fetch origin --tags > /dev/null 2>&1
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' > /dev/null 2>&1

          PASSED=0
          TOTAL=6
          declare -A CHECKS

          # 1. v1.0 exists and is annotated (annotated tags are their own object type "tag")
          if git tag -l | grep -qx "v1.0"; then
            TYPE=$(git cat-file -t v1.0 2>/dev/null)
            if [ "$TYPE" = "tag" ]; then
              CHECKS[v1_0_annotated]="pass"; PASSED=$((PASSED+1))
            else
              CHECKS[v1_0_annotated]="fail"
            fi
          else
            CHECKS[v1_0_annotated]="fail"
          fi

          # 2. v0.1 exists, is annotated, AND points to an earlier commit than v1.0
          V01_OK="fail"
          if git tag -l | grep -qx "v0.1"; then
            TYPE=$(git cat-file -t v0.1 2>/dev/null)
            if [ "$TYPE" = "tag" ]; then
              V01_COMMIT=$(git rev-list -n 1 v0.1)
              V10_COMMIT=$(git rev-list -n 1 v1.0 2>/dev/null)
              if [ -n "$V10_COMMIT" ] && git merge-base --is-ancestor "$V01_COMMIT" "$V10_COMMIT" 2>/dev/null; then
                V01_OK="pass"
              fi
            fi
          fi
          CHECKS[v0_1_earlier_commit]="$V01_OK"
          [ "$V01_OK" = "pass" ] && PASSED=$((PASSED+1))

          # 3. checkpoint exists and is lightweight (points directly to a commit object, not a tag object)
          if git tag -l | grep -qx "checkpoint"; then
            TYPE=$(git cat-file -t checkpoint 2>/dev/null)
            if [ "$TYPE" = "commit" ]; then
              CHECKS[checkpoint_lightweight]="pass"; PASSED=$((PASSED+1))
            else
              CHECKS[checkpoint_lightweight]="fail"
            fi
          else
            CHECKS[checkpoint_lightweight]="fail"
          fi

          # 4. All tags were actually pushed to the remote (not just local)
          REMOTE_TAGS=$(git ls-remote --tags origin | awk '{print $2}')
          TAGS_PUSHED="pass"
          for t in "v1.0" "v0.1" "checkpoint"; do
            echo "$REMOTE_TAGS" | grep -q "refs/tags/$t" || TAGS_PUSHED="fail"
          done
          CHECKS[tags_pushed]="$TAGS_PUSHED"
          [ "$TAGS_PUSHED" = "pass" ] && PASSED=$((PASSED+1))

          # 5. from-v0.1 branch exists on origin and was branched from v0.1's commit
          BRANCH_OK="fail"
          if git show-ref --verify --quiet refs/remotes/origin/from-v0.1; then
            V01_COMMIT=$(git rev-list -n 1 v0.1 2>/dev/null)
            if [ -n "$V01_COMMIT" ] && git merge-base --is-ancestor "$V01_COMMIT" origin/from-v0.1 2>/dev/null; then
              BRANCH_OK="pass"
            fi
          fi
          CHECKS[branch_from_tag]="$BRANCH_OK"
          [ "$BRANCH_OK" = "pass" ] && PASSED=$((PASSED+1))

          # 6. The notes file was actually committed on that branch
          if git log origin/from-v0.1 --oneline --grep="Add notes from v0.1" 2>/dev/null | grep -q .; then
            CHECKS[branch_commit_correct]="pass"; PASSED=$((PASSED+1))
          else
            CHECKS[branch_commit_correct]="fail"
          fi

          cd ..

          RESULTS_JSON="{"
          FIRST=1
          for key in "${!CHECKS[@]}"; do
            if [ $FIRST -eq 0 ]; then RESULTS_JSON+=","; fi
            RESULTS_JSON+="\"$key\": \"${CHECKS[$key]}\""
            FIRST=0
          done
          RESULTS_JSON+="}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": $PASSED,
            "total": $TOTAL,
            "results": $RESULTS_JSON
          }
          EOF

      # ------------------------------------------------------------
      # 3. Repository couldn't be cloned
      # ------------------------------------------------------------
      - name: Generate checkout error report
        if: steps.checkout.outcome != 'success'
        run: |
          mkdir -p reports

          SUBMISSION_ID="${{ github.event.client_payload.submission_id }}"

          cat > reports/$SUBMISSION_ID.json <<EOF
          {
            "submission_id": "$SUBMISSION_ID",
            "passed": 0,
            "total": 0,
            "error": "Repository could not be cloned."
          }
          EOF

      # ------------------------------------------------------------
      # 4. Upload report
      # ------------------------------------------------------------
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.client_payload.submission_id }}
          path: reports/${{ github.event.client_payload.submission_id }}.json

      # ------------------------------------------------------------
      # 5. Notify backend
      # ------------------------------------------------------------
      - name: Send result to backend
        if: always()
        run: |
          curl --fail -X POST "${{ secrets.BACKEND_URL }}/api/submissions/callback" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d @reports/${{ github.event.client_payload.submission_id }}.json